# Zima Looper - Single Worker Configuration
# Use this configuration for debugging or when you need sequential execution
# Easier to track issues with single-threaded execution

zima:
  version: "1.0.0"
  name: "Zima Looper"

# Worker configuration - SINGLE WORKER MODE
workers:
  count: 1                      # Only 1 worker (sequential execution)
  max_concurrent_stories: 1
  poll_interval_seconds: 2      # Fast polling since only 1 worker

# Claude CLI configuration
claude:
  cli_path: "claude"
  default_timeout_seconds: 600  # 10 minutes (more time for single worker)
  max_timeout_seconds: 1800     # 30 minutes maximum
  model: "sonnet"

# Retry configuration
retry:
  max_attempts: 3
  backoff_multiplier: 3
  base_delay_seconds: 5
  enable_claude_fix: true

# Checkpoint system
checkpoints:
  enabled: true
  frequency_minutes: 5
  max_checkpoints_per_story: 15  # More checkpoints for debugging

# Git configuration
git:
  auto_commit: true
  commit_message_template: "[Story {story_number}] {title}"
  use_branches: false           # Direct commits for simplicity
  branch_prefix: "zima/story-"

# Quality gates - BALANCED MODE
quality:
  run_tests_before_complete: true
  require_passing_tests: true
  require_syntax_valid: true
  require_composer_valid: false
  require_env_valid: true
  test_timeout_seconds: 600
  allow_no_tests: false
  rollback_on_failure: true
  max_test_failures: 0

# Monitoring - DEBUG MODE
monitoring:
  dashboard_enabled: true
  dashboard_port: 5000
  log_level: "DEBUG"            # Verbose logging for debugging
  metrics_enabled: true
  detailed_logging: true        # Full logs for every operation

# Notifications
notifications:
  console_enabled: true
  web_enabled: true
  notify_on_failure: true
  notify_on_completion: true

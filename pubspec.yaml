name: tajiri
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.10.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # HTTP client for API calls
  http: ^1.2.0
  http_parser: ^4.0.2
  dio: ^5.4.0
  crypto: ^3.0.3

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  sqflite: ^2.4.2
  path: ^1.9.1

  # Secure token storage (OS Keychain / Keystore)
  flutter_secure_storage: ^9.2.4

  # Biometric authentication (Face ID / fingerprint / device PIN)
  local_auth: ^2.3.0

  # Device ID generation (UUID v4)
  uuid: ^4.5.1

  # Media caching
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  flutter_blurhash: ^0.9.1

  # Visibility detection for auto-play
  visibility_detector: ^0.4.0+2

  # Media picker
  image_picker: ^1.0.7

  # Video/audio playback
  video_player: ^2.10.1
  chewie: ^1.13.0
  audioplayers: ^6.5.1
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  just_audio_background: ^0.0.1-beta.13

  # Prevent screen sleep
  wakelock_plus: ^1.2.8

  # Foreground service for music notification
  flutter_foreground_task: ^8.15.0

  intl: ^0.20.2
  url_launcher: ^6.3.2
  flutter_sound: ^9.30.0  # No macOS support - skip init on Platform.isMacOS
  file_picker: ^10.3.8
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4
  flutter_slidable: ^3.1.1

  # Photo gallery
  flutter_staggered_grid_view: ^0.7.0

  # WebSocket for real-time livestream updates
  web_socket_channel: ^3.0.1

  # WebRTC for voice/video calls (docs/video-audio-calls)
  # 0.12+ required: 0.11.x uses removed PluginRegistry.Registrar (Flutter v1 embedding)
  flutter_webrtc: ^0.12.12

  # 🆓 TAJIRI CUSTOM STREAMING SDK - 100% FREE (No cost ever!)
  # Professional-grade streaming built from scratch

  # Camera access
  camera: ^0.11.0+2

  # Video encoding & RTMP streaming
  # ffmpeg_kit_flutter: ^6.0.3  # Temporarily disabled - package discontinued, releases unavailable

  # Beauty filters & face detection (0.20+ aligns native deps with Firebase/GoogleUtilities 8)
  google_ml_kit: ^0.20.1
  image: ^4.1.7

  # Network monitoring
  connectivity_plus: ^6.1.0
  network_info_plus: ^5.0.3

  # Video frame processing
  ffi: ^2.1.2

  # Heroicons (SVG) from https://heroicons.com
  heroicons: ^0.11.0

  # Firebase: live UI updates when backend data changes (FlutterFire)
  firebase_core: ^3.8.1
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.5

  # Messages: location share, reminders
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  flutter_local_notifications: ^18.0.1
  share_plus: ^12.0.1
  qr_flutter: ^4.1.0

  # AdMob monetization
  google_mobile_ads: ^5.1.0

  # Native incoming call UI (CallKit on iOS, ConnectionService on Android)
  flutter_callkit_incoming: ^2.0.4+1

  # Kikoba module dependencies (from VICOBA app)
  firebase_auth: ^5.3.4
  firebase_database: ^11.2.1
  firebase_storage: ^12.3.7
  firebase_analytics: ^11.3.7
  logger: ^2.5.0
  device_info_plus: ^11.3.3
  package_info_plus: ^8.2.1
  pin_code_fields: ^8.0.1
  bubble: ^1.2.1
  emoji_picker_flutter: ^4.3.0
  group_button: ^5.3.4
  awesome_dialog: ^3.2.1
  bottom_navy_bar: ^6.1.0
  carousel_slider: ^5.0.0
  overlay_support: ^2.1.0
  font_awesome_flutter: ^10.8.0
  flutter_contacts: ^1.1.9+2
  sms_autofill: ^2.4.0
  encrypt: ^5.0.3
  currency_text_input_formatter: ^2.2.5
  google_fonts: ^6.2.1
  photo_view: ^0.15.0
  flutter_svg: ^2.0.17
  screenshot: ^3.0.0
  timeago: ^3.7.0
  steel_crypt: ^3.0.0+1
  chess: ^0.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/games/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
